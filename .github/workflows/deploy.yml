name: FoodExpress CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -var="my_ip=${{ secrets.MY_IP }}"

      - name: Get EC2 Public IP
        working-directory: terraform
        run: |
          echo "EC2_PUBLIC_IP=$(terraform output -raw ec2_public_ip)" >> $GITHUB_ENV

      - name: Wait for EC2 to be ready
        run: sleep 90

      - name: Copy project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "."
          target: "/home/ubuntu/foodexpress"

      - name: Deploy app on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            while sudo fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do
              echo "Waiting for apt lock..."
              sleep 5
            done

            sudo rm -f /var/lib/apt/lists/lock
            sudo rm -f /var/lib/dpkg/lock*
            sudo dpkg --configure -a

            sudo apt-get update -y
            sudo apt-get install -y docker.io

            sudo systemctl start docker
            sudo systemctl enable docker

            sudo usermod -aG docker ubuntu

            cd /home/ubuntu/foodexpress

            sudo docker stop foodexpress-container || true
            sudo docker rm foodexpress-container || true
            sudo docker build -t foodexpress-app .
            sudo docker run -d --name foodexpress-container -p 80:3000 --restart unless-stopped foodexpress-app

      - name: Show app URL
        run: echo "App deployed at http://${{ env.EC2_PUBLIC_IP }}"